name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run JUnit report smoke
        run: |
          embedding-cache-inspector inspect jsonl examples/sample.jsonl --expected-dimension 3 --format junit --report reports/cache.junit.xml --fail-on never
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("reports/cache.junit.xml")
          PY
